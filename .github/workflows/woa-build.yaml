name: Native Windows ARM64 Build

on: [push, pull_request]

jobs:
  build:
    # Use the native Windows ARM64 runner image
    runs-on: windows-11-arm

    steps:
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          # Pin your required version or use "25.x" for minor matching
          # version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Protoc Installation
        run: protoc --version

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Build and Test Natively
        run: |
          cargo build --target aarch64-pc-windows-msvc
          cargo test --target aarch64-pc-windows-msvc

      # Recursive list using PowerShell (default shell on Windows runners)
      - name: List all files recursively (PowerShell)
        if: always()
        run: Get-ChildItem -Recurse
